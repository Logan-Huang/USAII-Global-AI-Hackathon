name: AsylumAid
options:
  bundleIdPrefix: org.asylumaid
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""          # set your Apple team in Xcode → Signing & Capabilities
    CODE_SIGN_STYLE: Automatic

targets:
  AsylumAid:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: AsylumAid
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.asylumaid.app
        PRODUCT_NAME: AsylumAid
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: AsylumAid/App/Info.plist
      properties:
        CFBundleDisplayName: Asylum Aid
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "Asylum Aid uses your location only to show nearby help on the map. Your location is never stored or shared."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true   # loopback-only HTTP for the local dev backend
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
